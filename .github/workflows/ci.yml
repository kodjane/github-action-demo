name: CI

on:
  push:
    branches:
      - ft/automation_with_github_action
#  pull_request:
#    branches:
#      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Change to your required Java version
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{runner.os}}-maven-${{hashFiles('**/pom.xml')}}
          restore-keys: ${{runner.os}}-maven

      - name: Build and package
        run: mvn clean package

      - name: List the contents of the target directory
        run: ls -la target

      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image
        id: build
        run: | 
        # Extract the tag name from GITHUB_REF IMAGE_TAG=${GITHUB_REF##*/}
        # This extracts the tag name from GITHUB_REF echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
        # Set it as an environment variable docker build -t adkodjane/github-action-demo:${IMAGE_TAG} .

      - name: List all Docker images
        run: docker images

      - name: Push Docker image
        run: |
          docker push adkodjane/github-action-demo:${{env.IMAGE_TAG}}