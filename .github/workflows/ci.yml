name: CI

on:
  push:
    branches:
      - automation_with_github_actions
#  pull_request:
#    branches:
#      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17' # Change to your required Java version
          distribution: 'temurin'

      - name: Build and package
        run: mvn clean package

      - name: List the contents of the target directory
        run: ls -la target

      - name: Build Docker image
        run: |
          docker build -t github-action-demo:latest .
          docker tag github-action-demo:latest github-action-demo:${{ github.sha }}

      - name: List the docker  images
        run: docker images
